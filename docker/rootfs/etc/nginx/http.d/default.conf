server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /app/public;
    index index.php;

    server_tokens off;

    # ── Health check ─────────────────────────────────────────────────────────
    # Routed through PHP so the healthcheck plugin performs real DB checks.
    # A static file here would only prove Nginx is up, not the PHP stack.
    location = /up {
        try_files $uri /index.php$is_args$args;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Application ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass  unix:/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SERVER_NAME     $host;

        fastcgi_read_timeout 120s;
        fastcgi_buffer_size  16k;
        fastcgi_buffers      4 16k;
    }

    # ── Security ──────────────────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ ^/(artisan|composer\.(json|lock)|\.env) {
        deny all;
    }
}
