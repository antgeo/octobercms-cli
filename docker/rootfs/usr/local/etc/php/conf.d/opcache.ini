[opcache]
opcache.enable                  = 1
opcache.memory_consumption      = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
; validate_timestamps=0 is safe for immutable container images: file contents
; never change inside a running container so OPcache never needs to stat files.
opcache.validate_timestamps     = 0
opcache.revalidate_freq         = 0
opcache.fast_shutdown           = 1
; JIT is disabled: PHP 8.2 on Alpine (musl libc) can fatal on mmap() when JIT
; is enabled, crashing PHP-FPM before the socket is created. Bytecode caching
; alone provides the majority of the performance benefit.
