[www]
user  = www-data
group = www-data

; Unix socket — avoids TCP overhead for same-container communication.
; Path must match fastcgi_pass in nginx default.conf.
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
pm.max_requests      = 500

; Send FPM output to stderr so Docker captures it in container logs.
php_admin_flag[log_errors]    = on
php_admin_value[error_log]    = /proc/self/fd/2
php_admin_value[memory_limit] = 256M

php_admin_flag[expose_php] = off
