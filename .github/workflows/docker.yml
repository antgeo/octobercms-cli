name: Build and push Docker image

on:
  push:
    tags:
      - 'runtime-v[0-9]+.[0-9]+'   # e.g. runtime-v1.0 — builds all PHP versions
  workflow_dispatch:         # manual trigger also builds all versions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/octobercms
  LATEST_PHP: '8.5'

jobs:
  build-and-push:
    name: PHP ${{ matrix.php_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ['8.2', '8.3', '8.4', '8.5']
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless signing

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=php${{ matrix.php_version }}
            type=raw,value=latest,enable=${{ matrix.php_version == env.LATEST_PHP }}
          labels: |
            org.opencontainers.image.title=OctoberCMS Runtime (PHP ${{ matrix.php_version }})
            org.opencontainers.image.description=Third-party OctoberCMS runtime image — PHP-FPM + Nginx + s6-overlay (not affiliated with OctoberCMS)
            org.opencontainers.image.vendor=OctoberCMS CLI (third-party)

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PHP_VERSION=${{ matrix.php_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php${{ matrix.php_version }}
          cache-to: type=gha,mode=max,scope=php${{ matrix.php_version }}
          provenance: true
          sbom: true

      # ── Image size check ──────────────────────────────────────────────────
      - name: Check compressed image size
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          docker pull "${IMAGE}"
          SIZE_BYTES=$(docker manifest inspect "${IMAGE}" \
            | jq '[.layers[].size] | add')
          SIZE_MB=$(echo "scale=1; ${SIZE_BYTES}/1024/1024" | bc)
          echo "Compressed image size: ${SIZE_MB} MB"
          if [ "${SIZE_BYTES}" -gt $((300 * 1024 * 1024)) ]; then
              echo "ERROR: image exceeds 300 MB compressed (${SIZE_MB} MB)" >&2
              exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
