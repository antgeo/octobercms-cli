name: Build and push Docker image

on:
  push:
    tags:
      - 'php[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build (e.g. php8.3)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/octobercms

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless signing

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Two tag patterns:
      #   1. Full git tag verbatim (e.g. "php8.3")
      #   2. "latest" always points to the most recently published build
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=OctoberCMS Runtime
            org.opencontainers.image.description=Third-party OctoberCMS runtime image — PHP-FPM + Nginx + s6-overlay (not affiliated with OctoberCMS)
            org.opencontainers.image.vendor=OctoberCMS CLI (third-party)

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ── Image size check ──────────────────────────────────────────────────
      - name: Check compressed image size
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          docker pull "${IMAGE}"
          SIZE_BYTES=$(docker manifest inspect "${IMAGE}" \
            | jq '[.layers[].size] | add')
          SIZE_MB=$(echo "scale=1; ${SIZE_BYTES}/1024/1024" | bc)
          echo "Compressed image size: ${SIZE_MB} MB"
          if [ "${SIZE_BYTES}" -gt $((300 * 1024 * 1024)) ]; then
              echo "ERROR: image exceeds 300 MB compressed (${SIZE_MB} MB)" >&2
              exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
